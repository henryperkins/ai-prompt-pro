name: Deploy Agent Service to DigitalOcean App Platform

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      OPENAI_API_KEY_SECRET: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY_SECRET: ${{ secrets.CODEX_API_KEY }}
      AZURE_OPENAI_API_KEY_SECRET: ${{ secrets.AZURE_OPENAI_API_KEY }}
      CODEX_CONFIG_JSON_SECRET: ${{ secrets.CODEX_CONFIG_JSON }}
      AGENT_PUBLIC_API_KEY: ${{ secrets.VITE_AGENT_PUBLIC_API_KEY }}
      LEGACY_NEON_PUBLISHABLE_KEY: ${{ secrets.VITE_NEON_PUBLISHABLE_KEY }}
      LEGACY_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      AUTH_SESSION_VALIDATION_URL_SECRET: ${{ secrets.AUTH_SESSION_VALIDATION_URL }}
      AUTH_WORKER_URL: ${{ secrets.VITE_AUTH_WORKER_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve App Platform runtime secrets
        run: |
          if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ]; then
            echo "Missing required secret: DIGITALOCEAN_ACCESS_TOKEN"
            exit 1
          fi

          openai_api_key="$OPENAI_API_KEY_SECRET"
          if [ -z "$openai_api_key" ]; then
            openai_api_key="$CODEX_API_KEY_SECRET"
          fi
          if [ -z "$openai_api_key" ]; then
            if [ -z "$AZURE_OPENAI_API_KEY_SECRET" ] || [ -z "$CODEX_CONFIG_JSON_SECRET" ]; then
              echo "Missing provider secrets: set OPENAI_API_KEY or CODEX_API_KEY for the no-Azure path, or set AZURE_OPENAI_API_KEY plus CODEX_CONFIG_JSON for the transitional provider path."
              exit 1
            fi
          fi

          if [ -n "$openai_api_key" ] && [ -n "$CODEX_CONFIG_JSON_SECRET" ]; then
            echo "Direct OpenAI/Codex and CODEX_CONFIG_JSON are both configured. Clear CODEX_CONFIG_JSON if the DigitalOcean agent should avoid Azure provider config."
            exit 1
          fi

          function_public_api_key="${AGENT_PUBLIC_API_KEY:-$LEGACY_NEON_PUBLISHABLE_KEY}"
          if [ -z "$function_public_api_key" ]; then
            function_public_api_key="$LEGACY_SUPABASE_PUBLISHABLE_KEY"
          fi
          if [ -z "$function_public_api_key" ]; then
            echo "Missing required secret: VITE_AGENT_PUBLIC_API_KEY (or legacy VITE_NEON_PUBLISHABLE_KEY / VITE_SUPABASE_PUBLISHABLE_KEY)"
            exit 1
          fi

          auth_session_validation_url="$AUTH_SESSION_VALIDATION_URL_SECRET"
          if [ -z "$auth_session_validation_url" ] && [ -n "$AUTH_WORKER_URL" ]; then
            auth_worker_base_url="${AUTH_WORKER_URL%/}"
            auth_session_validation_url="${auth_worker_base_url}/auth/session"
          fi
          if [ -z "$auth_session_validation_url" ]; then
            echo "Missing required secret: AUTH_SESSION_VALIDATION_URL or VITE_AUTH_WORKER_URL"
            exit 1
          fi

          {
            echo "OPENAI_API_KEY=$openai_api_key"
            echo "FUNCTION_PUBLIC_API_KEY=$function_public_api_key"
            echo "AUTH_SESSION_VALIDATION_URL=$auth_session_validation_url"
            echo "AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY_SECRET"
            echo "CODEX_CONFIG_JSON=$CODEX_CONFIG_JSON_SECRET"
          } >> "$GITHUB_ENV"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Render App Platform spec
        run: |
          mkdir -p tmp
          node scripts/render-digitalocean-app-spec.mjs .do/app.yaml tmp/promptforge-agent.app.yaml

      - name: Validate App Platform spec
        run: doctl apps spec validate tmp/promptforge-agent.app.yaml --schema-only >/dev/null

      - name: Deploy to DigitalOcean App Platform
        run: |
          doctl apps create \
            --spec tmp/promptforge-agent.app.yaml \
            --upsert \
            --update-sources \
            --wait \
            --format ID,Spec.Name,DefaultIngress,ActiveDeployment.ID

      - name: Smoke test health endpoint
        run: |
          ingress="$(doctl apps list --format Spec.Name,DefaultIngress --no-header | awk '$1 == "promptforge-agent" {print $2; exit}')"
          if [ -z "$ingress" ]; then
            echo "Could not resolve DigitalOcean App Platform ingress for promptforge-agent"
            exit 1
          fi

          case "$ingress" in
            http://*|https://*) service_url="$ingress" ;;
            *) service_url="https://$ingress" ;;
          esac

          curl --fail --show-error --silent "$service_url/health"
          echo "DigitalOcean service URL: $service_url"
