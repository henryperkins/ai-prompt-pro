# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Node.js, GitHub Actions, and Azure App Service: https://aka.ms/node-webapps-actions

name: Build and deploy Node app to Azure Web App - ai-prompt-pro-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D7F1A836321C404BB27EE0628B2A255D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6108801119154E0DB94F9CD80314E673 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A34CBAD9B8184248B9A31387985B7908 }}

      - name: Validate Azure OpenAI settings
        run: |
          if [ -z "${{ secrets.AZURE_OPENAI_API_KEY }}" ]; then
            echo "Missing required secret: AZURE_OPENAI_API_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.CODEX_CONFIG_JSON }}" ]; then
            echo "Missing required secret: CODEX_CONFIG_JSON"
            exit 1
          fi
          if [ "${{ secrets.GH_CONTEXT_ENABLED }}" = "true" ]; then
            if [ -z "${{ secrets.GH_APP_ID }}" ]; then
              echo "Missing required secret: GH_APP_ID"
              exit 1
            fi
            if [ -z "${{ secrets.GH_APP_PRIVATE_KEY }}" ]; then
              echo "Missing required secret: GH_APP_PRIVATE_KEY"
              exit 1
            fi
            if [ -z "${{ secrets.GH_APP_SLUG }}" ]; then
              echo "Missing required secret: GH_APP_SLUG"
              exit 1
            fi
            if [ -z "${{ secrets.GH_APP_STATE_SECRET }}" ]; then
              echo "Missing required secret: GH_APP_STATE_SECRET"
              exit 1
            fi
            if [ -z "${{ secrets.GH_WEBHOOK_SECRET }}" ]; then
              echo "Missing required secret: GH_WEBHOOK_SECRET"
              exit 1
            fi
            if [ -z "${{ secrets.GH_POST_INSTALL_REDIRECT_URL }}" ]; then
              echo "Missing required secret: GH_POST_INSTALL_REDIRECT_URL"
              exit 1
            fi
            if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]; then
              echo "Missing required secret: NEON_DATABASE_URL"
              exit 1
            fi
          fi

      - name: Enforce Web App Runtime Configuration
        run: |
          az webapp config set \
            --resource-group rg-ai-prompt-pro \
            --name ai-prompt-pro-agent \
            --linux-fx-version "NODE|24-lts" \
            --startup-file "node agent_service/codex_service.mjs"
          az webapp config appsettings set \
            --resource-group rg-ai-prompt-pro \
            --name ai-prompt-pro-agent \
            --settings \
              CODEX_SKIP_GIT_REPO_CHECK=true \
              NEON_AUTH_URL="${{ secrets.VITE_NEON_AUTH_URL }}" \
              NEON_JWKS_URL="${{ secrets.VITE_NEON_AUTH_URL }}/.well-known/jwks.json" \
              FUNCTION_PUBLIC_API_KEY="${{ secrets.VITE_NEON_PUBLISHABLE_KEY }}" \
              NEON_PUBLISHABLE_KEY="${{ secrets.VITE_NEON_PUBLISHABLE_KEY }}" \
              GITHUB_CONTEXT_ENABLED="${{ secrets.GH_CONTEXT_ENABLED }}" \
              GITHUB_APP_ID="${{ secrets.GH_APP_ID }}" \
              GITHUB_APP_PRIVATE_KEY="${{ secrets.GH_APP_PRIVATE_KEY }}" \
              GITHUB_APP_SLUG="${{ secrets.GH_APP_SLUG }}" \
              GITHUB_APP_STATE_SECRET="${{ secrets.GH_APP_STATE_SECRET }}" \
              GITHUB_WEBHOOK_SECRET="${{ secrets.GH_WEBHOOK_SECRET }}" \
              GITHUB_POST_INSTALL_REDIRECT_URL="${{ secrets.GH_POST_INSTALL_REDIRECT_URL }}" \
              NEON_DATABASE_URL="${{ secrets.NEON_DATABASE_URL }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              CODEX_CONFIG_JSON='${{ secrets.CODEX_CONFIG_JSON }}' \
              REQUIRE_PROVIDER_CONFIG=true \
              CODEX_MODEL="gpt-5.4-mini" \
              CODEX_MODEL_REASONING_EFFORT="xhigh" \
              ALLOWED_ORIGINS="https://promptforge.pages.dev,https://prompt.lakefrontdigital.io,http://localhost:8080,http://localhost:5173"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "ai-prompt-pro-agent"
          slot-name: "Production"
          package: .
          startup-command: "node agent_service/codex_service.mjs"
