# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Node.js, GitHub Actions, and Azure App Service: https://aka.ms/node-webapps-actions

name: Build and deploy Node app to Azure Web App - promptforge-agent

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D7F1A836321C404BB27EE0628B2A255D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6108801119154E0DB94F9CD80314E673 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A34CBAD9B8184248B9A31387985B7908 }}

      - name: Validate Azure OpenAI settings
        run: |
          if [ -z "${{ secrets.AZURE_OPENAI_API_KEY }}" ]; then
            echo "Missing required secret: AZURE_OPENAI_API_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.CODEX_CONFIG_JSON }}" ]; then
            echo "Missing required secret: CODEX_CONFIG_JSON"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_AGENT_PUBLIC_API_KEY }}" ] && [ -z "${{ secrets.VITE_NEON_PUBLISHABLE_KEY }}" ] && [ -z "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" ]; then
            echo "Missing required secret: VITE_AGENT_PUBLIC_API_KEY (or legacy VITE_NEON_PUBLISHABLE_KEY / VITE_SUPABASE_PUBLISHABLE_KEY)"
            exit 1
          fi
      - name: Enforce Web App Runtime Configuration
        env:
          AGENT_PUBLIC_API_KEY: ${{ secrets.VITE_AGENT_PUBLIC_API_KEY }}
          LEGACY_NEON_PUBLISHABLE_KEY: ${{ secrets.VITE_NEON_PUBLISHABLE_KEY }}
          LEGACY_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          OPTIONAL_AUTH_WORKER_URL: ${{ secrets.VITE_AUTH_WORKER_URL }}
          OPTIONAL_NEON_AUTH_URL: ${{ secrets.VITE_NEON_AUTH_URL }}
          AZURE_OPENAI_API_KEY_SECRET: ${{ secrets.AZURE_OPENAI_API_KEY }}
          CODEX_CONFIG_JSON_SECRET: ${{ secrets.CODEX_CONFIG_JSON }}
          GH_APP_ID_SECRET: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY_SECRET: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_SLUG_SECRET: ${{ secrets.GH_APP_SLUG }}
          GH_APP_STATE_SECRET_SECRET: ${{ secrets.GH_APP_STATE_SECRET }}
          GH_WEBHOOK_SECRET_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          GH_POST_INSTALL_REDIRECT_URL_SECRET: ${{ secrets.GH_POST_INSTALL_REDIRECT_URL }}
          NEON_DATABASE_URL_SECRET: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          agent_public_api_key="${AGENT_PUBLIC_API_KEY:-$LEGACY_NEON_PUBLISHABLE_KEY}"
          if [ -z "$agent_public_api_key" ]; then
            agent_public_api_key="$LEGACY_SUPABASE_PUBLISHABLE_KEY"
          fi

          az webapp config set \
            --resource-group rg-promptforge \
            --name promptforge-agent \
            --linux-fx-version "NODE|24-lts" \
            --startup-file "node agent_service/codex_service.mjs" \
            -o none

          settings=(
            "CODEX_SKIP_GIT_REPO_CHECK=true"
            "FUNCTION_PUBLIC_API_KEY=$agent_public_api_key"
            "AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY_SECRET}"
            "CODEX_CONFIG_JSON=${CODEX_CONFIG_JSON_SECRET}"
            "REQUIRE_PROVIDER_CONFIG=true"
            "CODEX_MODEL=gpt-5.4-mini"
            "CODEX_MODEL_REASONING_EFFORT=xhigh"
            "ALLOWED_ORIGINS=https://promptforge.pages.dev,https://prompt.lakefrontdigital.io,http://localhost:8080,http://localhost:5173"
          )

          if [ -n "$OPTIONAL_NEON_AUTH_URL" ]; then
            settings+=(
              "NEON_AUTH_URL=$OPTIONAL_NEON_AUTH_URL"
              "NEON_JWKS_URL=$OPTIONAL_NEON_AUTH_URL/.well-known/jwks.json"
            )
          fi

          if [ -n "$OPTIONAL_AUTH_WORKER_URL" ]; then
            auth_worker_base_url="${OPTIONAL_AUTH_WORKER_URL%/}"
            settings+=(
              "AUTH_SESSION_VALIDATION_URL=${auth_worker_base_url}/auth/session"
            )
          fi

          github_secret_count=0
          for value in \
            "$GH_APP_ID_SECRET" \
            "$GH_APP_PRIVATE_KEY_SECRET" \
            "$GH_APP_SLUG_SECRET" \
            "$GH_APP_STATE_SECRET_SECRET" \
            "$GH_WEBHOOK_SECRET_SECRET" \
            "$GH_POST_INSTALL_REDIRECT_URL_SECRET" \
            "$NEON_DATABASE_URL_SECRET"; do
            if [ -n "$value" ]; then
              github_secret_count=$((github_secret_count + 1))
            fi
          done

          if [ "$github_secret_count" -gt 0 ] && [ "$github_secret_count" -lt 7 ]; then
            echo "GitHub context secrets are partially configured. Set all required GH_* and NEON_DATABASE_URL secrets or clear them entirely."
            exit 1
          fi

          if [ "$github_secret_count" -eq 7 ] && [ -z "$OPTIONAL_AUTH_WORKER_URL" ] && [ -z "$OPTIONAL_NEON_AUTH_URL" ]; then
            echo "GitHub context requires either VITE_AUTH_WORKER_URL or VITE_NEON_AUTH_URL so user-session validation can be configured."
            exit 1
          fi

          if [ "$github_secret_count" -eq 7 ]; then
            settings+=(
              "GITHUB_APP_ID=${GH_APP_ID_SECRET}"
              "GITHUB_APP_PRIVATE_KEY=${GH_APP_PRIVATE_KEY_SECRET}"
              "GITHUB_APP_SLUG=${GH_APP_SLUG_SECRET}"
              "GITHUB_APP_STATE_SECRET=${GH_APP_STATE_SECRET_SECRET}"
              "GITHUB_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET_SECRET}"
              "GITHUB_POST_INSTALL_REDIRECT_URL=${GH_POST_INSTALL_REDIRECT_URL_SECRET}"
              "NEON_DATABASE_URL=${NEON_DATABASE_URL_SECRET}"
            )
          fi

          az webapp config appsettings set \
            --resource-group rg-promptforge \
            --name promptforge-agent \
            --settings "${settings[@]}" \
            -o none

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "promptforge-agent"
          slot-name: "Production"
          package: .
          startup-command: "node agent_service/codex_service.mjs"
